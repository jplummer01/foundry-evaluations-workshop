# Native Foundry agent-version comparison report for GitHub Actions.
# This is for hosted/service-executable agents. Workshop prompt agents use local
# Python tools, so use github-actions-migration-gate.yml for those agents.

name: agent-eval-comparison

on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC federation to Entra ID
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Beta tag shown for workshop readability. Production workflows should
      # pin a reviewed commit SHA and revalidate it before each delivery.
      - name: Compare hosted agent versions
        uses: microsoft/ai-agent-evals@v3-beta
        with:
          azure-ai-project-endpoint: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          deployment-name: ${{ vars.FOUNDRY_JUDGE_DEPLOYMENT }}
          data-path: ${{ github.workspace }}/examples/eval-gate-dataset.json
          agent-ids: ${{ vars.AGENT_IDS }}
          baseline-agent-id: ${{ vars.BASELINE_AGENT_ID }}

      # The public action contract documents a rendered comparison summary, not
      # machine-readable outputs or threshold-based job failure. Do not parse
      # undocumented internals; use the enforcing precomputed workflow instead.
