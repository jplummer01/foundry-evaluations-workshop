# Evaluation as a PR gate in GitHub Actions.
# Uses OIDC federation to Entra ID - no long-lived secrets.
# Check the marketplace for the current Microsoft agent-evaluation action name
# and pin a version; the action ecosystem is evolving alongside the SDK.

name: agent-eval-gate

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write   # OIDC federation to Entra ID
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Portable fallback: run the same SDK pattern used in lab/run_cloud_eval.py.
      # This works regardless of marketplace action availability.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run cloud evaluation
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_JUDGE_DEPLOYMENT: ${{ vars.FOUNDRY_JUDGE_DEPLOYMENT }}
          DEMO_AGENT_NAME: ${{ vars.AGENT_NAME }}
        run: |
          pip install -r lab/requirements.txt
          python lab/run_cloud_eval.py

      # NOTE: as written, run_cloud_eval.py submits the run and polls to completion
      # but exits 0 regardless of per-row scores - it is a "run the eval" step, not
      # yet an enforcing gate. To make this block a merge, extend the script (or add
      # a step here) to retrieve run results and `exit 1` when a threshold is breached.
      # Suggested policy: safety evaluators (builtin.violence) -> hard fail;
      # quality evaluators -> fail on regression vs. a stored baseline.
